name: Update sing-box
on:
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".github/workflows/delete-old-workflows.yml"
      - ".github/workflows/update-adguardhome.yml"
      - ".github/workflows/update-dashboard.yml"
      - ".github/workflows/update-mihomo.yml"

permissions:
  contents: write

jobs:
  go:
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.go.outputs.version }}
    steps:
      - name: Get `Go` latest version
        id: go
        run: |
          echo "version=$(curl -sSL https://raw.githubusercontent.com/actions/go-versions/update-versions-manifest-file/versions-manifest.json | jq -r '.[0].version')" >> ${GITHUB_OUTPUT}

  ref1nd_stable_version:
    runs-on: ubuntu-latest
    outputs:
      ref1nd_stable_version: ${{ steps.version.outputs.ref1nd_stable_version }}
      ref1nd_stable_time: ${{ steps.version.outputs.ref1nd_stable_time }}
      ref1nd_stable_linux_tags: ${{ steps.version.outputs.ref1nd_stable_linux_tags }}
      ref1nd_stable_windows_tags: ${{ steps.version.outputs.ref1nd_stable_windows_tags }}
      ref1nd_stable_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Get `sing-box reF1nd-Stable` version
        id: version
        run: |
          while true; do
            ref1nd_stable_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases/latest | jq -r '.tag_name' | sed 's/^v//')
            ref1nd_stable_time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases/latest | jq -r '.published_at // .created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')
            if [[ -n "${ref1nd_stable_version}" && "${ref1nd_stable_version}" != "null" ]]; then
              echo "ref1nd_stable_version=${ref1nd_stable_version}" >> ${GITHUB_OUTPUT}
              echo "ref1nd_stable_time=${ref1nd_stable_time}" >> ${GITHUB_OUTPUT}
              break
            fi
            echo "未获取到 reF1nd-Stable 版本号，将在 10 秒后重试..."
            sleep 10
          done

          echo "ref1nd_stable_linux_tags=with_quic,with_utls,with_clash_api" >> ${GITHUB_OUTPUT}
          echo "ref1nd_stable_windows_tags=with_gvisor,with_quic,with_utls,with_clash_api,with_tailscale" >> ${GITHUB_OUTPUT}

      - name: Compare `sing-box reF1nd-Stable` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box reF1nd-Stable|${{ steps.version.outputs.ref1nd_stable_version }}|${{ steps.version.outputs.ref1nd_stable_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> ${GITHUB_OUTPUT}

  ref1nd_stable_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1, variant: musl }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3, variant: musl }
          - { name: linux-armv5, goos: linux, goarch: arm, goarm: 5 }
          - { name: linux-armv6, goos: linux, goarch: arm, goarm: 6 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7, variant: musl }
          - { name: linux-arm64, goos: linux, goarch: arm64, variant: musl }
          - { name: linux-mips-softfloat, goos: linux, goarch: mips, gomips: softfloat }
          - { name: linux-mipsle-softfloat, goos: linux, goarch: mipsle, gomips: softfloat }
          - { name: linux-mipsle-hardfloat, goos: linux, goarch: mipsle, gomips: hardfloat }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - ref1nd_stable_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      ref1nd_stable_VERSION: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_version }}
      ref1nd_stable_linux_TAGS: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_linux_tags }}
      ref1nd_stable_windows_TAGS: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_windows_tags }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v7
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable

      - name: Setup `Go`
        uses: actions/setup-go@v7
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box reF1nd-Stable` core (Linux)
        if: ${{ matrix.goos == 'linux' }}
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_stable_VERSION}' -s -w -buildid=" -tags "${ref1nd_stable_linux_TAGS}" ./cmd/sing-box

      - name: Build `sing-box reF1nd-Stable` core (Windows)
        if: ${{ matrix.goos == 'windows' }}
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_stable_VERSION}' -s -w -buildid=" -tags "${ref1nd_stable_windows_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-ref1nd-stable-${{ matrix.name }}
          path: sing-box*

  ref1nd_testing_version:
    runs-on: ubuntu-latest
    outputs:
      ref1nd_testing_version: ${{ steps.version.outputs.ref1nd_testing_version }}
      ref1nd_testing_time: ${{ steps.version.outputs.ref1nd_testing_time }}
      ref1nd_testing_linux_tags: ${{ steps.version.outputs.ref1nd_testing_linux_tags }}
      ref1nd_testing_windows_tags: ${{ steps.version.outputs.ref1nd_testing_windows_tags }}
      ref1nd_testing_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Get `sing-box reF1nd-Test` version
        id: version
        run: |
          while true; do
            ref1nd_testing_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases | jq -r '.[] | select(.tag_name | test("alpha|beta|rc")) | .tag_name' | head -n 1 | sed 's/^v//')
            ref1nd_testing_time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases | jq -r '.[] | select(.tag_name | test("alpha|beta|rc")) | (.published_at // .created_at)' | head -n 1 | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')
            if [[ -n "${ref1nd_testing_version}" && "${ref1nd_testing_version}" != "null" ]]; then
              echo "ref1nd_testing_version=${ref1nd_testing_version}" >> ${GITHUB_OUTPUT}
              echo "ref1nd_testing_time=${ref1nd_testing_time}" >> ${GITHUB_OUTPUT}
              break
            fi
            echo "未获取到 reF1nd-Testing 版本号，将在 10 秒后重试..."
            sleep 10
          done

          echo "ref1nd_testing_linux_tags=with_quic,with_utls,with_clash_api" >> ${GITHUB_OUTPUT}
          echo "ref1nd_testing_windows_tags=with_gvisor,with_quic,with_utls,with_clash_api,with_tailscale" >> ${GITHUB_OUTPUT}

      - name: Compare `sing-box reF1nd-Testing` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box reF1nd-Testing|${{ steps.version.outputs.ref1nd_testing_version }}|${{ steps.version.outputs.ref1nd_testing_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> ${GITHUB_OUTPUT}

  ref1nd_testing_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_testing_version.outputs.ref1nd_testing_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1, variant: musl }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3, variant: musl }
          - { name: linux-armv5, goos: linux, goarch: arm, goarm: 5 }
          - { name: linux-armv6, goos: linux, goarch: arm, goarm: 6 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7, variant: musl }
          - { name: linux-arm64, goos: linux, goarch: arm64, variant: musl }
          - { name: linux-mips-softfloat, goos: linux, goarch: mips, gomips: softfloat }
          - { name: linux-mipsle-softfloat, goos: linux, goarch: mipsle, gomips: softfloat }
          - { name: linux-mipsle-hardfloat, goos: linux, goarch: mipsle, gomips: hardfloat }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - ref1nd_testing_version
      - go
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      ref1nd_testing_VERSION: ${{ needs.ref1nd_testing_version.outputs.ref1nd_testing_version }}
      ref1nd_testing_linux_TAGS: ${{ needs.ref1nd_testing_version.outputs.ref1nd_testing_linux_tags }}
      ref1nd_testing_windows_TAGS: ${{ needs.ref1nd_testing_version.outputs.ref1nd_testing_windows_tags }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v7
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-testing

      - name: Setup `Go`
        uses: actions/setup-go@v7
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box reF1nd-Testing` core (Linux)
        if: ${{ matrix.goos == 'linux' }}
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_testing_VERSION}' -s -w -buildid=" -tags "${ref1nd_testing_linux_TAGS}" ./cmd/sing-box

