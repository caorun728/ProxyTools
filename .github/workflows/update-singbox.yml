    steps:
      - name: Checkout `SagerNet/sing-box`
        uses: actions/checkout@v7
        with:
          repository: SagerNet/sing-box
          ref: testing

      - name: Setup `Go`
        uses: actions/setup-go@v7
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box Testing` core (Linux)
        if: ${{ matrix.goos == 'linux' }}
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${singbox_testing_VERSION}' -s -w -buildid=" -tags "${singbox_testing_linux_TAGS}" ./cmd/sing-box

